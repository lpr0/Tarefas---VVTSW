            function register () {

                let ele = {
                    name: "Lucas",
                    lastname: "teste",
                    email: "testando@gmail.com",
                    password: "testando"
                }

                const config = {
                    "headers" : {'content-type': 'application/json'},
                    "body" : JSON.stringify(ele),
                    "method" : "POST"
                }
                
                fetch(url+"/register", config).then((res)=>{
                    if (!res.ok) {
                        throw new Error ("falha")
                    }
                    return res.json();
                }).then((json)=> {
                    console.log(json);
                }).catch((erro)=>{
                    console.log(erro);
                })

            }

            document.querySelector("#register").addEventListener("click", register);

            document.querySelector("#authenticate").addEventListener("click", authenticate);
