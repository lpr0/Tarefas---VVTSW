<html>
    <head>
        <title>Teste de requisições</title>
        <meta charset="UTF-8" lang="PT-bt">
    </head>
    <body>
        <style>
            button {
                margin-top: 10px;
                margin-left: auto;
                margin-left: auto;
            }
            h3 {
                margin-top: 10px;
                margin-left: 20px;
            }
        </style>

        <h3> Abra o console</h3>

        <button id="register"> teste register</button>
        <button id="authenticate"> teste authenticate</button>
        
        <button id="get"> teste get</button>
        <button id="post"> teste post</button>



        <script>
            let token = null
            const Bu = document.querySelectorAll("button");
            const url = "http://localhost:8080/tarefas";


            function register () {

                let ele = {
                    name: "Lucas",
                    lastname: "teste",
                    email: "testando@gmail.com",
                    password: "testando"
                }

                const config = {
                    "headers" : {'content-type': 'application/json'},
                    "body" : JSON.stringify(ele),
                    "method" : "POST"
                }
                
                fetch(url+"/register", config).then((res)=>{
                    if (!res.ok) {
                        throw new Error ("falha")
                    }
                    return res.json();
                }).then((json)=> {
                    console.log(json);
                }).catch((erro)=>{
                    console.log(erro);
                })

            }

            document.querySelector("#register").addEventListener("click", register);


            function authenticate () {

                let ele = {
                    username: "testando@gmail.com",
                    password: "testando"
                }

                const config = {
                    "headers" : {'content-type': 'application/json'},
                    "body" : JSON.stringify(ele),
                    "method" : "POST"
                }
                
                fetch(url+"/authenticate", config).then((res)=>{
                    if (!res.ok) {
                        throw new Error ("falha")
                    }
                    return res.json();
                }).then((json)=> {
                    console.log(json);
                    token = json["token"]
                }).catch((erro)=>{
                    console.log(erro);
                })

            }

            document.querySelector("#authenticate").addEventListener("click", authenticate);

            function get () {

                let config = {
                    "method" : "GET",
                    "headers" : {"Authorization": `Bearer ${token}`, 'content-type': 'application/json'}
                }

                fetch(url, config).then((res)=>{
                    if (!res.ok) {
                        throw new Error ("falha")
                    }
                    return res.json();
                }).then((json)=> {
                    console.log(json);
                }).catch((erro)=>{
                    console.log(erro);
                })
            }

            document.querySelector("#get").addEventListener("click", get);
            
            var cont = 0
            function post () {
                cont += 1
                let ele = {
                    titulo: "Tarefa " + cont,
                    descricao: "testando " + cont,
                    dataLimite: "2026-05-05",
                    categoriaID: 1
                }

                const config = {
                    "headers" : {"Authorization": `Bearer ${token}`, 'content-type': 'application/json'},
                    "body" : JSON.stringify(ele),
                    "method" : "POST"
                }
                
                fetch(url, config).then((res)=>{
                    if (!res.ok) {
                        throw new Error ("falha")
                    }
                    return res.json();
                }).then((json)=> {
                    console.log(json);
                    token = json["token"]
                }).catch((erro)=>{
                    console.log(erro);
                })

            }

            document.querySelector("#post").addEventListener("click", post);


        </script>
    </body>
</html>
